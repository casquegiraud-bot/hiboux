<!DOCTYPE html>
<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>HIBOUX V3</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
#menu{padding:20px;background:#081425;min-height:100vh}
button{padding:12px 18px;border-radius:12px;border:0}
#stealth{display:none;position:fixed;inset:0;background:#000;z-index:10}
#call{display:none;position:fixed;inset:0;background:#111827;color:#fff;z-index:20;text-align:center;padding-top:40px}
#hang{background:#c00;color:#fff;border-radius:50%;width:80px;height:80px}
</style></head>
<body>
<div id="menu">
<h1>🦉 HIBOUX V3</h1>
<p>Phrase test conservée : "il fait chaud" = +20 points.</p>
<button onclick="launch()">Lancer HIBOUX</button>
<div>Score : <span id="score">0</span></div>
</div>

<div id="stealth"></div>

<div id="call">
<h2 id="caller">MAMAN</h2>
<div id="timer">00:00</div>
<br><br>
<button id="hang" onclick="hangup()">📞</button>
</div>

<script>
let score=0,taps=0,callTimer,intv;

function launch(){
 document.getElementById('stealth').style.display='block';
}

document.getElementById('stealth').onclick=()=>{
 taps++;
 setTimeout(()=>taps=0,1200);
 if(taps>=4){
   document.getElementById('stealth').style.display='none';
   taps=0;
 }
}

function addHot(){
 score+=20;
 document.getElementById('score').textContent=score;
 if(score>=80) incoming();
}

function incoming(){
 document.getElementById('call').style.display='block';
 setTimeout(answerFlow,1500);
}

function answerFlow(){
 let u1=new SpeechSynthesisUtterance("Allo ?");
 u1.lang='fr-FR';
 speechSynthesis.speak(u1);

 setTimeout(()=>{
  let u2=new SpeechSynthesisUtterance("Allo ma chérie ?");
  u2.lang='fr-FR';
  speechSynthesis.speak(u2);
 },2500);

 setTimeout(()=>{
  let u3=new SpeechSynthesisUtterance("Tu m'entends ?");
  u3.lang='fr-FR';
  speechSynthesis.speak(u3);
 },5000);

 setTimeout(()=>{
   hiboux();
   startTimer();
 },9000);
}

function hiboux(){
 const msg="Bonjour. Ceci est un message de sécurité HIBOU. La situation analysée devient inquiétante. Je répète. La situation analysée devient inquiétante. Je répète. La situation analysée devient inquiétante. Quittez calmement cette situation et rejoignez un lieu fréquenté.";
 let u=new SpeechSynthesisUtterance(msg);
 u.lang='fr-FR';
 u.pitch=0.7;
 speechSynthesis.speak(u);
}

function startTimer(){
 let s=0;
 intv=setInterval(()=>{
  s++;
  let m=String(Math.floor(s/60)).padStart(2,'0');
  let ss=String(s%60).padStart(2,'0');
  document.getElementById('timer').textContent=m+":"+ss;
 },1000);
}

function hangup(){
 clearInterval(intv);
 speechSynthesis.cancel();
 document.getElementById('call').style.display='none';
 document.getElementById('stealth').style.display='block';
}

window.addHot=addHot;
</script>
</body></html>
